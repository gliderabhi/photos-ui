<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gloss" x1="0" y1="0" x2="0.55" y2="0.85">
      <stop offset="0%" stop-color="white" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="100" height="100" fill="white"/>

  <g style="isolation:isolate">
    <!-- Card 1: Cyan — back-left, forms the vertical stem of the P -->
    <rect x="14" y="20" width="36" height="62" rx="5" fill="#00EEFF"
          transform="rotate(-15,32,51)" style="mix-blend-mode:multiply"/>
    <rect x="14" y="20" width="36" height="62" rx="5"
          fill="url(#gloss)" transform="rotate(-15,32,51)"/>

    <!-- Card 2: Magenta — center, forms the main body -->
    <rect x="32" y="18" width="36" height="62" rx="5" fill="#FF00CC"
          transform="rotate(-1,50,49)" style="mix-blend-mode:multiply"/>
    <rect x="32" y="18" width="36" height="62" rx="5"
          fill="url(#gloss)" transform="rotate(-1,50,49)"/>

    <!-- Card 3: Yellow — top-right, forms the bowl of the P -->
    <rect x="46" y="15" width="42" height="44" rx="5" fill="#FFE800"
          transform="rotate(12,67,37)" style="mix-blend-mode:multiply"/>
    <rect x="46" y="15" width="42" height="44" rx="5"
          fill="url(#gloss)" transform="rotate(12,67,37)"/>
  </g>
</svg>
